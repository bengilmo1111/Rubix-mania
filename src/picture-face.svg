<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="sky" cx="50%" cy="42%" r="72%">
      <stop offset="0%" stop-color="#3a2f6e"/>
      <stop offset="46%" stop-color="#1a1740"/>
      <stop offset="100%" stop-color="#080a1d"/>
    </radialGradient>
    <radialGradient id="ghost" cx="50%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#eef1ff"/>
      <stop offset="100%" stop-color="#c9d2ff"/>
    </radialGradient>
    <radialGradient id="cheek" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff9ec4"/>
      <stop offset="100%" stop-color="#ff9ec4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moon" cx="42%" cy="40%" r="62%">
      <stop offset="0%" stop-color="#fff3c4"/>
      <stop offset="100%" stop-color="#f6d874"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#sky)"/>

  <!-- moon -->
  <circle cx="398" cy="118" r="52" fill="url(#moon)"/>
  <circle cx="378" cy="104" r="12" fill="#e7c65f" opacity="0.5"/>
  <circle cx="410" cy="140" r="8" fill="#e7c65f" opacity="0.45"/>

  <!-- stars -->
  <g fill="#ffffff">
    <circle cx="70" cy="80" r="4"/>
    <circle cx="132" cy="150" r="2.5"/>
    <circle cx="60" cy="220" r="3"/>
    <circle cx="120" cy="300" r="2"/>
    <circle cx="86" cy="410" r="3.5"/>
    <circle cx="180" cy="452" r="2.5"/>
    <circle cx="300" cy="470" r="3"/>
    <circle cx="440" cy="300" r="3"/>
    <circle cx="462" cy="220" r="2.5"/>
    <circle cx="420" cy="410" r="2"/>
    <circle cx="255" cy="60" r="3"/>
    <circle cx="200" cy="110" r="2"/>
  </g>
  <g fill="#bcd0ff" opacity="0.9">
    <path d="M256 24 l6 16 16 6 -16 6 -6 16 -6 -16 -16 -6 16 -6 z"/>
    <path d="M470 150 l4 11 11 4 -11 4 -4 11 -4 -11 -11 -4 11 -4 z"/>
    <path d="M40 330 l4 11 11 4 -11 4 -4 11 -4 -11 -11 -4 11 -4 z"/>
  </g>

  <!-- ghost glow -->
  <ellipse cx="256" cy="290" rx="150" ry="170" fill="#aab6ff" opacity="0.35" filter="url(#soft)"/>

  <!-- ghost body -->
  <path fill="url(#ghost)" d="M256 96
    c-83 0 -140 60 -140 150
    v132
    c0 18 22 26 34 13
    l20 -22 c7 -8 19 -8 26 0 l18 20 c7 8 19 8 26 0 l18 -20
    c7 -8 19 -8 26 0 l20 22 c12 13 34 5 34 -13
    v-132
    c0 -90 -57 -150 -140 -150 z"/>

  <!-- cheeks -->
  <ellipse cx="196" cy="272" rx="30" ry="20" fill="url(#cheek)"/>
  <ellipse cx="316" cy="272" rx="30" ry="20" fill="url(#cheek)"/>

  <!-- eyes -->
  <ellipse cx="212" cy="236" rx="20" ry="26" fill="#20214a"/>
  <ellipse cx="300" cy="236" rx="20" ry="26" fill="#20214a"/>
  <circle cx="205" cy="227" r="6" fill="#ffffff"/>
  <circle cx="293" cy="227" r="6" fill="#ffffff"/>

  <!-- mouth -->
  <path d="M232 286 q24 30 48 0 q-24 14 -48 0 z" fill="#20214a"/>

  <!-- little arms -->
  <path fill="url(#ghost)" d="M120 250 q-30 6 -34 34 q22 -14 40 -10 z"/>
  <path fill="url(#ghost)" d="M392 250 q30 6 34 34 q-22 -14 -40 -10 z"/>
</svg>
