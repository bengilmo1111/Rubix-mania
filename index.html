<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#06091d" />
    <meta name="description" content="Rubix Mania — a tactile voxel cube puzzle floating in space." />
    <title>Rubix Mania</title>
  </head>
  <body>
    <main id="app">
      <canvas id="game-canvas" aria-label="Interactive 2 by 2 voxel cube"></canvas>

      <header class="hud top-hud">
        <div>
          <p class="eyebrow">Casper presents</p>
          <h1>Rubix Mania</h1>
        </div>
        <div class="score-card" aria-live="polite">
          <span>Moves</span>
          <strong id="move-count">0</strong>
        </div>
      </header>

      <section class="hint-card" id="hint-card">
        <strong>Push a row</strong>
        <span>Swipe the cube to twist. Use two fingers to look and pinch to zoom.</span>
      </section>

      <nav class="hud controls" aria-label="Game controls">
        <button id="undo-btn" type="button">↶ <span>Undo</span></button>
        <button id="view-btn" class="primary" type="button" aria-pressed="false">◇ <span>View</span></button>
        <button id="menu-btn" type="button" aria-expanded="false" aria-controls="game-menu">••• <span>More</span></button>
      </nav>

      <section class="game-menu" id="game-menu" hidden aria-label="More game actions">
        <button id="scramble-btn" type="button">✦ <span><strong>Scramble cube</strong><small>Start a new random puzzle</small></span></button>
        <button id="reset-btn" class="danger" type="button">↺ <span><strong>Reset cube</strong><small>Return to the solved state</small></span></button>
      </section>

      <dialog class="confirm-dialog" id="confirm-dialog">
        <form method="dialog">
          <p class="dialog-eyebrow">Please confirm</p>
          <h2 id="confirm-title">Start over?</h2>
          <p id="confirm-copy">This will replace your current cube.</p>
          <div class="dialog-actions">
            <button value="cancel" type="submit">Cancel</button>
            <button id="confirm-action" class="danger" value="confirm" type="submit">Continue</button>
          </div>
        </form>
      </dialog>

      <div class="status-pill" id="status-pill" role="status">Ready</div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
